name: Deploy AI Service to Cloud Run

on:
  push:
    branches: [ main ]
    paths:
      - 'ai-service/**'
      - '.github/workflows/deploy-ai-service.yml'

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for GCP
        run: gcloud auth configure-docker --quiet

      - name: Build and Push Container
        working-directory: ai-service
        run: |
          docker build -t gcr.io/${{ secrets.GCP_PROJECT_ID }}/watering-ai-service:${{ github.sha }} .
          docker push gcr.io/${{ secrets.GCP_PROJECT_ID }}/watering-ai-service:${{ github.sha }}

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy watering-ai-service \
            --image gcr.io/${{ secrets.GCP_PROJECT_ID }}/watering-ai-service:${{ github.sha }} \
            --platform managed \
            --region ${{ secrets.GCP_REGION }} \
            --allow-unauthenticated \
            --update-env-vars ANTHROPIC_API_KEY=${{ secrets.ANTHROPIC_API_KEY }},FIREBASE_PROJECT_ID=${{ secrets.FIREBASE_PROJECT_ID }}
